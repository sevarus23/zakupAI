services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zakupai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zakupai}
      POSTGRES_DB: ${POSTGRES_DB:-zakupai}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zakupai} -d ${POSTGRES_DB:-zakupai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.zakupai.tech}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ENABLE_EMBEDDED_QUEUE: ${ENABLE_EMBEDDED_QUEUE:-true}
      GISP_SCRAPER_URL: ${GISP_SCRAPER_URL:-http://gisp-scraper:8000}
      LLM_TRACE_ENABLED: ${LLM_TRACE_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    expose:
      - "8000"

  gisp-scraper:
    build:
      context: ./gisp-scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GISP_MAX_CONCURRENT: ${GISP_MAX_CONCURRENT:-3}
      PP719_HTTP_TIMEOUT: ${PP719_HTTP_TIMEOUT:-30}
      CATALOG_PAGE_TIMEOUT: ${CATALOG_PAGE_TIMEOUT:-30}
      LOG_LEVEL: ${GISP_SCRAPER_LOG_LEVEL:-INFO}
    expose:
      - "8000"
    # Selenium spawns helper processes; the default 64 MB shm causes Chromium crashes.
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request, sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3).status == 200 else sys.exit(1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  etl-suppliers:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      LLM_TRACE_ENABLED: ${LLM_TRACE_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      WORKER_TASK_TYPES: supplier_search,supplier_search_perplexity
    expose:
      - "8002"

  etl-compare:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      LLM_TRACE_ENABLED: ${LLM_TRACE_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      WORKER_TASK_TYPES: lot_comparison
    expose:
      - "8002"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  doc-to-md:
    build:
      context: ./doc-to-md
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    volumes:
      - doc_to_md_models:/models
    expose:
      - "8001"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - doc-to-md
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/www/landing:/var/www/landing:ro

volumes:
  db_data:
  doc_to_md_models:
