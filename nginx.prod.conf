# Redirect HTTP to HTTPS for all domains
server {
    listen 80;
    server_name zakupai.tech www.zakupai.tech app.zakupai.tech;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Landing page — zakupai.tech and www
server {
    listen 443 ssl;
    server_name zakupai.tech www.zakupai.tech;

    ssl_certificate /etc/letsencrypt/live/zakupai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zakupai.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    root /var/www/landing;
    index index.html;

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Application — app.zakupai.tech
server {
    listen 443 ssl;
    server_name app.zakupai.tech;

    ssl_certificate /etc/letsencrypt/live/app.zakupai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.zakupai.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /doc-to-md/ {
        proxy_pass http://doc-to-md:8001/;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        proxy_pass http://frontend:80/;
    }
}
