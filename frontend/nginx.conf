server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Auth pages — serve directly
    location = /login.html {
        try_files $uri =404;
    }

    location = /register.html {
        try_files $uri =404;
    }

    location = /admin.html {
        try_files $uri =404;
    }

    # CSS/JS — must-revalidate so query-string cache busts actually take effect
    location ~* \.(css|js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    # Other static assets — long cache is fine
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML — never cache, otherwise users see stale markup with old script tags
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # SPA fallback — all other routes serve index.html (also no-cache)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }
}
