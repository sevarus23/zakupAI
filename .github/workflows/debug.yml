name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai
            echo "=== TASK STATUS ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT id, task_type, status, created_at, substring(output_text for 300) as output_excerpt FROM llmtask ORDER BY created_at DESC LIMIT 10;"
            echo ""
            echo "=== SUPPLIERS IN DB ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT id, purchase_id, company_name, website_url, relevance_score FROM supplier ORDER BY id DESC LIMIT 10;"
            echo ""
            echo "=== ETL LOGS ==="
            docker compose -f docker-compose.prod.yml logs etl --tail=50
