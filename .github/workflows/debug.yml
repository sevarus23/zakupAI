name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai
            echo "=== RESET supplier_search TASKS ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "UPDATE llmtask SET status='queued', output_text=NULL WHERE task_type IN ('supplier_search','supplier_search_perplexity') AND status IN ('completed','in_progress','failed');"
            echo ""
            echo "=== TASK STATUS ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT id, task_type, status, created_at FROM llmtask ORDER BY created_at DESC LIMIT 10;"
            echo ""
            echo "=== ENABLE_EMBEDDED_QUEUE CHECK ==="
            docker compose -f docker-compose.prod.yml exec -T backend env | grep ENABLE
            echo ""
            echo "=== ETL LAST 30 LOGS ==="
            docker compose -f docker-compose.prod.yml logs etl --tail=30
            echo ""
            echo "=== CONTAINER STATUS ==="
            docker compose -f docker-compose.prod.yml ps
