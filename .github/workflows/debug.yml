name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "UPDATE \"user\" SET is_admin=true WHERE email='qwadro@mail.ru';"
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT id, email, is_admin FROM \"user\" WHERE email='qwadro@mail.ru';"
