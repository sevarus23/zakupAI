name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai
            echo "=== LATEST TASK NOTE ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT id, task_type, status, output_text::json->>'note' as note FROM llmtask WHERE task_type='supplier_search' ORDER BY created_at DESC LIMIT 5;"
            echo ""
            echo "=== SUPPLIER SOURCES SUMMARY ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U zakupai -d zakupai -c "SELECT source, count(*) FROM suppliercontact GROUP BY source;"
