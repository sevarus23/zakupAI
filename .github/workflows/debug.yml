name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai
            echo "=== CONTAINER STATUS ==="
            docker compose ps
            echo ""
            echo "=== TASK STATUS ==="
            docker compose exec -T db psql -U zakupai -d zakupai -c "SELECT id, task_type, status, created_at, substring(output_text for 200) as output_excerpt FROM llmtask WHERE purchase_id=3 ORDER BY created_at DESC LIMIT 5;"
            echo ""
            echo "=== BACKEND ERROR LOGS ==="
            docker compose logs backend 2>&1 | grep -i -E "error|failed|exception|timeout|traceback" | tail -30
            echo ""
            echo "=== BACKEND LAST 30 LOGS ==="
            docker compose logs backend --tail=30
            echo ""
            echo "=== ENV CHECK ==="
            grep -E "OPENAI|OPENROUTER" .env 2>/dev/null | sed 's/=.*/=***/'
