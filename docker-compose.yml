version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    env_file: .env
    ports:
      - "8000:8000"

  etl:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file: .env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend

  doc-to-md:
    build:
      context: ./doc-to-md
    restart: unless-stopped
    volumes:
      - doc_to_md_models:/models

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - doc-to-md
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tender-gpt.ru.crt:/etc/ssl/tender-gpt.ru.crt:ro
      - ./tender-gpt.ru.key:/etc/ssl/tender-gpt.ru.key:ro
      - ./ca.crt:/etc/ssl/ca.crt:ro

volumes:
  db_data:
  doc_to_md_models:
